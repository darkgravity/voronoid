<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Voronoi Shader</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: sans-serif; }
    canvas#glCanvas { display: block; position: fixed; inset: 0; width: 100%; height: 100%; pointer-events: all; }

    #ui {
      position: fixed; top: 0; left: 0; height: 100vh;
      width: 320px;
      background: rgba(20,20,20,0.92);
      border-right: 1px solid rgba(255,255,255,0.1);
      display: flex; flex-direction: column;
      transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
      z-index: 10;
    }
    #ui.hidden { transform: translateX(-320px); }

    #ui-scroll {
      flex: 1; overflow-y: auto; padding: 12px 14px 20px;
      scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.15) transparent;
    }

    #ui-toggle {
      position: fixed; top: 12px; left: 12px;
      width: 32px; height: 32px; border-radius: 50%;
      background: rgba(20,20,20,0.92); border: 1px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.5);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; z-index: 100;
      transition: opacity 0.2s;
      opacity: 0; pointer-events: none;
    }
    #ui-toggle:hover { background: rgba(30,30,30,0.95); color: rgba(255,255,255,0.8); border-color: rgba(255,255,255,0.25); }
    #ui-toggle.visible { opacity: 1; pointer-events: all; }

    #ui-collapse {
      display: flex; align-items: center;
      padding: 8px 10px 6px; flex-shrink: 0; gap: 4px;
    }
    #btn-collapse {
      width: 32px; height: 32px; min-width: 32px; border-radius: 50%;
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.45);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0; padding: 0;
    }
    #btn-collapse:hover { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.7); }

    /* Mobile close button — hidden on desktop */
    #btn-mobile-close {
      display: none;
      width: 34px; height: 34px; min-width: 34px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.6); cursor: pointer;
      align-items: center; justify-content: center; padding: 0;
      flex-shrink: 0;
    }

    .section-title {
      color: rgba(255,255,255,0.35); font-size: 10px; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase; margin: 14px 0 6px;
    }

    .row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid rgba(255,255,255,0.03); }

    label {
      color: rgba(255,255,255,0.45); font-size: 11px;
      width: 80px; flex-shrink: 0; text-align: right;
    }

    input[type=range] { flex: 1; accent-color: #fff; height: 2px; touch-action: none; }

    .val { color: #fff; font-size: 11px; width: 38px; text-align: right; flex-shrink: 0; }

    .btn-row { display: flex; gap: 0; margin-bottom: 4px; }

    button {
      padding: 4px 12px; border-radius: 4px;
      border: 1px solid rgba(255,255,255,0.18);
      background: transparent; color: rgba(255,255,255,0.5);
      font-size: 11px; cursor: pointer; transition: background 0.1s, color 0.1s;
    }
    button:hover { background: rgba(255,255,255,0.08); }
    button.active { background: #fff; color: #000; border-color: #fff; }
    button.small { padding: 3px 8px; font-size: 10px; }
    button.danger { border-color: rgba(255,80,80,0.4); color: rgba(255,100,100,0.7); }
    button.danger:hover { background: rgba(255,60,60,0.15); }

    /* ── Segmented button bar ───────────────────── */
    .seg-bar {
      display: flex; border-radius: 8px; overflow: hidden;
      border: 1px solid rgba(255,255,255,0.18); margin-bottom: 4px;
    }
    .seg-bar button {
      flex: 1; border: none; border-radius: 0; margin: 0;
      padding: 5px 8px; font-size: 11px;
      background: rgba(255,255,255,0.04); color: rgba(255,255,255,0.5);
      border-right: 1px solid rgba(255,255,255,0.12);
      min-height: 28px;
    }
    .seg-bar button:last-child { border-right: none; }
    .seg-bar button:hover { background: rgba(255,255,255,0.1); }
    .seg-bar button.active { background: rgba(255,255,255,0.9); color: #111; }

    /* Shape icon buttons */
    .seg-bar button.shape-icon { padding: 4px 8px; min-width: 32px; }
    .seg-bar button.shape-icon svg { display: block; }



    /* ── Action bar (header) ────────────────────── */
    #action-bar {
      display: flex; gap: 4px; align-items: center;
    }
    .action-icon {
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
      border-radius: 50%; color: rgba(255,255,255,0.45); padding: 0;
      cursor: pointer; transition: all 0.15s; display: flex;
      align-items: center; justify-content: center;
      width: 32px; height: 32px; flex-shrink: 0;
    }
    .action-icon:hover { color: rgba(255,255,255,0.8); border-color: rgba(255,255,255,0.3); background: rgba(255,255,255,0.1); }
    .action-icon:active { background: rgba(255,255,255,0.15); }

    /* ── Tab bar ────────────────────────────────── */

    .tab-bar {
      display: flex; gap: 0; margin: 8px 0 4px;
      background: rgba(255,255,255,0.04); border-radius: 8px;
      padding: 3px; overflow-x: auto; -webkit-overflow-scrolling: touch;
    }
    .tab-bar::-webkit-scrollbar { display: none; }
    .tab-btn {
      flex: 1; min-width: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 2px;
      padding: 7px 2px 5px;
      background: none; border: none; color: rgba(255,255,255,0.3);
      cursor: pointer; border-radius: 6px;
      transition: all 0.15s; font-size: 7px; font-weight: 500;
      letter-spacing: 0.02em;
    }
    .tab-btn:hover { color: rgba(255,255,255,0.6); background: rgba(255,255,255,0.04); }
    .tab-btn.active { color: #fff; background: rgba(255,255,255,0.1); }
    .tab-btn svg { opacity: 0.5; transition: opacity 0.15s; }
    .tab-btn.active svg { opacity: 1; }
.tab-panel { display: none; }
    .tab-panel.active { display: block; }

    .divider { border: none; border-top: 1px solid rgba(255,255,255,0.07); margin: 8px 0; }

    /* ── Player strip ───────────────────────────── */
    #player-strip {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 8px;
    }
    #player-strip #btn-play {
      width: 36px; height: 36px; min-width: 36px;
      border-radius: 50%; padding: 0;
      display: flex; align-items: center; justify-content: center;
      border: 2px solid rgba(255,255,255,0.3);
      background: transparent; color: rgba(255,255,255,0.6);
      transition: all 0.15s;
    }
    #player-strip #btn-play:hover { border-color: rgba(255,255,255,0.5); color: rgba(255,255,255,0.8); }
    #player-strip #btn-play.active { background: rgba(255,255,255,0.25); border-color: rgba(255,255,255,0.3); color: #fff; }
    #player-strip input[type=range] { flex: 1; }
    #player-strip .val { width: 28px; }

    .color-swatch {
      width: 22px; height: 22px; border-radius: 3px; flex-shrink: 0;
      border: 1px solid rgba(255,255,255,0.25); cursor: pointer;
      position: relative; overflow: hidden;
    }
    .color-swatch input[type=color] {
      position: absolute; inset: 0; width: 100%; height: 100%;
      opacity: 0; cursor: pointer; border: none; padding: 0;
    }



    .group-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 6px; margin-bottom: 8px; overflow: hidden;
    }
    .group-header {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 10px;
      background: rgba(255,255,255,0.03);
      border-bottom: 1px solid rgba(255,255,255,0.07);
      user-select: none;
    }
    .group-header .g-title {
      flex: 1; color: rgba(255,255,255,0.7); font-size: 12px; font-weight: 500;
    }
    .group-header .g-actions { display: flex; gap: 4px; }
    .group-body { padding: 8px 10px; }
    .group-body .row label { width: 70px; }
    .drag-handle { color: rgba(255,255,255,0.25); font-size: 14px; cursor: grab; padding: 0 2px; }


    /* ── Toggle header (label + toggle switch) ──── */
    .toggle-header {
      display: flex; align-items: center; justify-content: space-between;
      margin: 0 0 10px; padding: 0;
    }
    .toggle-header .toggle-label {
      color: rgba(255,255,255,0.35); font-size: 10px; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
    }
    /* Disabled overlay for untoggled controls */
    .controls-disabled {
      opacity: 0.3; pointer-events: none;
    }
    .toggle-active {
      width: 44px !important; height: 26px !important; min-width: 44px; min-height: 26px;
      max-width: 44px; max-height: 26px;
      border-radius: 13px !important;
      background: rgba(255,255,255,0.15) !important; border: none !important;
      position: relative; cursor: pointer; flex-shrink: 0; flex-grow: 0;
      padding: 0 !important; margin: 0; line-height: 0; font-size: 0;
      transition: background 0.2s;
      -webkit-appearance: none; appearance: none;
      box-sizing: content-box !important;
      outline: none;
      display: inline-block;
      overflow: hidden;
    }
    .toggle-active:hover { background: rgba(255,255,255,0.2) !important; }
    .toggle-active::after {
      content: ''; position: absolute; top: 3px; left: 3px;
      width: 20px; height: 20px; border-radius: 50%;
      background: rgba(255,255,255,0.5); transition: transform 0.2s, background 0.2s;
      box-sizing: border-box;
    }


    .toggle-active.on { background: rgba(255,255,255,0.35) !important; }
    .toggle-active.on::after { transform: translateX(18px); background: #fff; }

    select {
      flex: 1; background: #1a1a1a; color: #ccc;
      border: 1px solid rgba(255,255,255,0.15); border-radius: 4px;
      font-size: 11px; padding: 3px 6px; cursor: pointer; outline: none;
    }
    select option { background: #1a1a1a; color: #ccc; }
    select:hover { background: #252525; }

    /* ── Gradient editor ────────────────────────── */

    /* ── Fullscreen button ──────────────────────── */
    #btn-fullscreen {
      position: fixed; top: 12px; right: 12px; z-index: 100;
      width: 36px; height: 36px; border-radius: 50%;
      background: rgba(20,20,20,0.7); border: 1px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.7); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      padding: 0; transition: background 0.15s;
    }
    #btn-fullscreen:hover { background: rgba(60,60,60,0.8); }

    /* ── Recording indicator ────────────────────── */
    #rec-indicator {
      display: none; position: fixed; top: 14px; left: 14px; z-index: 100;
      background: rgba(0,0,0,0.6); border-radius: 6px; padding: 6px 12px;
      color: #fff; font-size: 12px; font-weight: 600;
      align-items: center; gap: 6px; backdrop-filter: blur(6px);
    }
    #rec-indicator.visible { display: flex; }
    #rec-dot {
      width: 10px; height: 10px; border-radius: 50%; background: #f44;
      animation: recBlink 1s infinite;
    }
    @keyframes recBlink { 0%,100%{opacity:1} 50%{opacity:0.3} }

    /* ── Shader loading overlay ──────────────────── */
    #shader-loading-overlay {
      position: fixed; inset: 0; z-index: 99999;
      background: #0d0d0d;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px;
      transition: opacity 0.3s ease;
    }
    #shader-loading-overlay.fade-out { opacity: 0; pointer-events: none; }
    .shader-spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: rgba(255,255,255,0.55);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .shader-loading-text {
      color: rgba(255,255,255,0.35);
      font-size: 12px;
      font-family: monospace;
      letter-spacing: 0.05em;
    }
    #mobile-float {
      display: none; /* hidden on desktop */
    }

    .grad-editor { position: relative; margin: 8px 0; user-select: none; }
    .grad-bar {
      width: 100%; height: 24px; border-radius: 4px;
      border: 1px solid rgba(255,255,255,0.15);
      cursor: crosshair;
    }
    .grad-track {
      position: relative; width: 100%; height: 20px; margin-top: 2px;
    }
    .grad-handle {
      position: absolute; top: 0;
      width: 14px; height: 14px;
      margin-left: -7px;
      border-radius: 2px;
      border: 2px solid rgba(255,255,255,0.7);
      cursor: grab;
      transition: border-color 0.1s;
    }
    .grad-handle:hover, .grad-handle.dragging {
      border-color: #fff;
      z-index: 2;
    }
    .grad-handle.selected {
      border-color: rgba(255,255,255,0.4);
    }
    /* hidden color input inside each handle */
    .grad-handle input[type=color] {
      position: absolute; inset: 0; width: 100%; height: 100%;
      opacity: 0; cursor: pointer; border: none; padding: 0;
    }
    .grad-hint {
      color: rgba(255,255,255,0.25); font-size: 9px; margin-top: 4px;
      text-align: center;
    }

    /* ── Mobile layout ──────────────────────────── */
    @media (max-width: 768px) {
      #ui {
        top: auto; bottom: 0; left: 0; right: 0;
        width: 100%; height: 55vh;
        border-right: none;
        border-top: 1px solid rgba(255,255,255,0.15);
        border-radius: 16px 16px 0 0;
        transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
      }
      #ui.hidden { transform: translateY(100%); }

      #ui-collapse {
        padding: 8px 12px 6px; min-height: 48px;
      }
      #btn-collapse { display: none !important; }
      #btn-mobile-close { display: flex !important; }
      .action-icon { width: 36px; height: 36px; }

      #ui-scroll { padding: 8px 16px 24px; }

    .tab-bar { margin: 4px 0; padding: 2px; }
      .tab-btn { padding: 5px 1px 3px; font-size: 7px; }
      .tab-btn svg { width: 18px; height: 18px; }
      #action-bar { gap: 5px; }

      #ui-toggle {
        top: auto; bottom: 12px; left: 50%; transform: translateX(-50%);
        width: 44px; height: 44px; border-radius: 22px; font-size: 16px;
        display: none; /* replaced by mobile-float on mobile */
      }

      #mobile-float {
        display: none; /* shown only when panel is hidden */
        position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
        gap: 10px; z-index: 100; align-items: center;
      }
      #mobile-float.visible { display: flex; }
      #mobile-float button {
        width: 48px; height: 48px; border-radius: 50%;
        background: rgba(20,20,20,0.75); border: 1px solid rgba(255,255,255,0.25);
        color: rgba(255,255,255,0.8); cursor: pointer;
        display: flex; align-items: center; justify-content: center;
        padding: 0; backdrop-filter: blur(6px); min-height: auto;
      }
      #mobile-float button:hover { background: rgba(40,40,40,0.85); }
      #mobile-float button.active { background: rgba(255,255,255,0.25); border-color: rgba(255,255,255,0.3); color: #fff; }

      #btn-fullscreen { top: 10px; right: 10px; width: 40px; height: 40px; }

      #player-strip #btn-play { width: 44px; height: 44px; min-width: 44px; border-width: 2px; }
      #player-strip #btn-play svg { width: 20px; height: 20px; }

      .section-title { font-size: 11px; margin: 16px 0 8px; }

      .row { gap: 8px; margin-bottom: 8px; }
      label { font-size: 12px; width: 75px; }
      input[type=range] { height: 6px; }
      .val { font-size: 12px; }

      button {
        padding: 8px 14px; font-size: 12px;
        min-height: 36px; touch-action: manipulation;
      }
      button.small { padding: 6px 10px; font-size: 11px; min-height: 32px; }

      .btn-row { gap: 6px; margin-bottom: 6px; }

      select { font-size: 13px; padding: 6px 10px; min-height: 36px; }

      .color-swatch { width: 32px; height: 32px; border-radius: 4px; }

      .grad-bar { height: 32px; }
      .grad-track { height: 28px; }
      .grad-handle { width: 20px; height: 20px; margin-left: -10px; border-width: 3px; }
      .grad-hint { font-size: 10px; }

      .group-card { margin-bottom: 10px; }
      .group-header { padding: 8px 12px; }
      .group-body { padding: 10px 12px; }
      .group-body .row label { width: 65px; }

  
    /* ── Toggle header (label + toggle switch) ──── */
    .toggle-header {
      display: flex; align-items: center; justify-content: space-between;
      margin: 0 0 10px; padding: 0;
    }
    .toggle-header .toggle-label {
      color: rgba(255,255,255,0.35); font-size: 10px; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
    }
    /* Disabled overlay for untoggled controls */
    .controls-disabled {
      opacity: 0.3; pointer-events: none;
    }
      /* toggle same on all devices */

      #groups-header { margin: 16px 0 10px; }
    }

    /* Extra small screens */
    @media (max-width: 420px) {
      #ui { height: 60vh; }
      label { width: 60px; font-size: 11px; }
      button { padding: 7px 10px; font-size: 11px; }
    }

    /* ── Custom color picker overlay ────────────── */
    #color-picker-overlay {
      display: none; position: fixed; inset: 0; z-index: 500;
      background: rgba(0,0,0,0.6); align-items: center; justify-content: center;
    }
    #color-picker-overlay.open { display: flex; }
    #color-picker-panel {
      background: #222; border-radius: 12px; padding: 16px;
      width: 280px; box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    #cp-sv-area {
      width: 100%; height: 180px; border-radius: 6px; position: relative;
      cursor: crosshair; touch-action: none; margin-bottom: 12px;
    }
    #cp-sv-cursor {
      width: 18px; height: 18px; border-radius: 50%;
      border: 2px solid #fff; box-shadow: 0 0 4px rgba(0,0,0,0.5);
      position: absolute; pointer-events: none;
      transform: translate(-50%,-50%);
    }
    #cp-hue-bar {
      width: 100%; height: 20px; border-radius: 10px; cursor: pointer;
      touch-action: none; position: relative; margin-bottom: 12px;
      background: linear-gradient(to right, #f00 0%, #ff0 17%, #0f0 33%, #0ff 50%, #00f 67%, #f0f 83%, #f00 100%);
    }
    #cp-hue-cursor {
      width: 14px; height: 26px; border-radius: 7px; border: 2px solid #fff;
      box-shadow: 0 0 4px rgba(0,0,0,0.4); position: absolute; top: -3px;
      pointer-events: none; transform: translateX(-50%);
    }
    #cp-preview-row {
      display: flex; align-items: center; gap: 10px; margin-bottom: 12px;
    }
    #cp-preview {
      width: 44px; height: 44px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.3);
    }
    #cp-rgb-inputs { display: flex; gap: 6px; flex: 1; }
    #cp-rgb-inputs div { flex: 1; text-align: center; }
    #cp-rgb-inputs input {
      width: 100%; background: #333; border: 1px solid #555; color: #fff;
      border-radius: 4px; padding: 4px; font-size: 13px; text-align: center;
    }
    #cp-rgb-inputs span { font-size: 10px; color: #888; }
    #cp-actions { display: flex; gap: 8px; justify-content: flex-end; }
    #cp-actions button { min-height: 32px; }

    /* ── Pixelate instance tabs ─────────────────────── */
    .pix-instance-bar {
      display: flex; align-items: center; gap: 6px; margin: 6px 0 4px;
    }
    .pix-add-btn {
      width: 26px; height: 26px; min-width: 26px; border-radius: 50%; flex-shrink: 0;
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.18);
      color: rgba(255,255,255,0.55); font-size: 20px; line-height: 1;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; padding: 0; padding-bottom: 2px;
    }
    .pix-add-btn:hover { background: rgba(255,255,255,0.13); color: #fff; border-color: rgba(255,255,255,0.3); }
    .pix-tabs { display: flex; gap: 3px; flex: 1; overflow-x: auto; min-width: 0; }
    .pix-tabs::-webkit-scrollbar { display: none; }
    .pix-tab {
      padding: 4px 8px 4px 10px; border-radius: 5px; font-size: 10px; font-weight: 500;
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.4); cursor: pointer; white-space: nowrap;
      display: flex; align-items: center; gap: 4px; letter-spacing: 0.02em;
    }
    .pix-tab:hover { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.7); border-color: rgba(255,255,255,0.18); }
    .pix-tab.active { background: rgba(255,255,255,0.11); color: #fff; border-color: rgba(255,255,255,0.28); }
    .pix-tab-close {
      width: 14px; height: 14px; border-radius: 50%;
      background: transparent; border: none;
      color: rgba(255,255,255,0.3); font-size: 9px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; padding: 0; flex-shrink: 0;
    }
    .pix-tab-close:hover { color: rgba(255,100,100,0.9); background: rgba(255,50,50,0.18); }

    /* ── Editable numeric value inputs ──────────────── */
    input[type=number].val {
      background: transparent; border: none; outline: none;
      color: #fff; font-size: 11px; width: 38px; text-align: right;
      flex-shrink: 0; padding: 0; margin: 0; font-family: inherit;
      border-bottom: 1px solid transparent;
      -moz-appearance: textfield;
      cursor: text;
      transition: border-color 0.12s;
    }
    input[type=number].val::-webkit-outer-spin-button,
    input[type=number].val::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number].val:focus { border-bottom-color: rgba(255,255,255,0.4); }
    input[type=number].val:hover:not(:focus) { border-bottom-color: rgba(255,255,255,0.2); }

    /* ── Canvas size (custom mode) ───────────────────── */
    #canvas-container {
      position: fixed; inset: 0; display: flex;
      align-items: center; justify-content: center;
      pointer-events: none; z-index: 0;
      background: #000;
    }
    #canvas-container.custom { background: #0a0a0a; }
    canvas#glCanvas { display: block; position: fixed; inset: 0; width: 100%; height: 100%; pointer-events: all; }
    canvas#glCanvas.custom-size {
      position: relative; inset: auto; pointer-events: all;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.08), 0 8px 40px rgba(0,0,0,0.7);
    }

    /* All small action buttons: circular, same height as toggle */
    .btn-circ {
      width: 22px; height: 22px; min-width: 22px; min-height: 22px;
      border-radius: 50%; padding: 0; font-size: 12px; line-height: 22px;
      display: inline-flex; align-items: center; justify-content: center;
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.18);
      color: #ccc; cursor: pointer;
    }
    .btn-circ:hover { background: rgba(255,255,255,0.16); }
    .btn-circ.danger { color: #f66; border-color: rgba(255,80,80,0.25); }
    .btn-circ.danger:hover { background: rgba(255,80,80,0.15); }
    /* Filter + button */
    .btn-filter-add-circle { width: 22px; height: 22px; min-width: 22px; border-radius: 50%;
      font-size: 16px; font-weight: bold; padding: 0; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #ccc; }
    .btn-filter-add-circle:hover { background: rgba(255,255,255,0.18); }
    /* Card header buttons inherit circular */
    .group-header .small, .group-header .danger {
      width: 22px; height: 22px; min-width: 22px; min-height: 22px;
      border-radius: 50%; padding: 0; font-size: 11px;
      display: inline-flex; align-items: center; justify-content: center;
    }
    /* Collapse chevron */
    .collapse-chev { cursor: pointer; transition: transform 0.15s; color: #fff; opacity: 0.7; flex-shrink: 0; }
    .collapse-chev:hover { opacity: 1; }
    /* Collapsible sections */
    .section-collapsed { display: none !important; }
    .sec-hdr { display: flex; align-items: center; gap: 4px; cursor: pointer; user-select: none; }
    .sec-hdr:hover .collapse-chev { opacity: 1; }
    .toggle-header .collapse-chev { margin-right: 2px; }
  </style>
</head>

    // Mobile: quick horizontal flick on canvas to cycle flavors
    // Distinguishes from pan by requiring high velocity + short duration
    (function() {
      let swipeStartX = 0, swipeStartY = 0, swipeStartTime = 0;
      const canvas = document.getElementById('glCanvas');
      canvas.addEventListener('touchstart', function(e) {
        if (e.touches.length !== 1) return;
        swipeStartX = e.touches[0].clientX;
        swipeStartY = e.touches[0].clientY;
        swipeStartTime = Date.now();
      }, {passive: true});
      canvas.addEventListener('touchend', function(e) {
        const dt = Date.now() - swipeStartTime;
        if (dt > 300) return; // too slow = pan, not flick
        const dx = e.changedTouches[0].clientX - swipeStartX;
        const dy = e.changedTouches[0].clientY - swipeStartY;
        if (Math.abs(dx) < 80 || Math.abs(dy) > Math.abs(dx) * 0.5) return;
        const sel = document.getElementById('selFlavor');
        if (!sel || sel.options.length === 0) return;
        let idx = sel.selectedIndex;
        if (dx < 0) idx = (idx + 1) % sel.options.length;
        else idx = (idx - 1 + sel.options.length) % sel.options.length;
        if (idx !== sel.selectedIndex) {
          sel.selectedIndex = idx;
          loadFlavor(sel.value);
        }
      }, {passive: true});
    })();

    // Pinch-to-zoom on canvas: adjusts noise element size when in noise mode
    (function() {
      const canvas = document.getElementById('glCanvas');
      let pinchStartDist = 0, pinchStartSize = 0;
      canvas.addEventListener('touchstart', function(e) {
        if (e.touches.length === 2) {
          var dx = e.touches[0].clientX - e.touches[1].clientX;
          var dy = e.touches[0].clientY - e.touches[1].clientY;
          pinchStartDist = Math.sqrt(dx*dx + dy*dy);
          pinchStartSize = window.shaderParams.noiseElementSize || 0.5;
        }
      }, {passive: true});
      canvas.addEventListener('touchmove', function(e) {
        if (e.touches.length === 2 && window.shaderParams.mode === 3) {
          e.preventDefault();
          var dx = e.touches[0].clientX - e.touches[1].clientX;
          var dy = e.touches[0].clientY - e.touches[1].clientY;
          var dist = Math.sqrt(dx*dx + dy*dy);
          if (pinchStartDist > 0) {
            var ratio = pinchStartDist / dist; // pinch in = larger value (zoom out)
            var newSize = Math.max(0.01, Math.min(2.0, pinchStartSize * ratio));
            window.shaderParams.noiseElementSize = newSize;
            var sl = document.getElementById('sNoiseElemSize');
            var va = document.getElementById('vNoiseElemSize');
            if (sl) sl.value = newSize;
            if (va) va.value = newSize.toFixed(2);
            window.shaderDirty = true;
          }
        }
      }, {passive: false});
    })();

    /* ── Source switching (Voronoi / Camera) ───────────────────── */
    let cameraStream = null;

    function setSource(src) {
      window.shaderParams.source = src;
      document.getElementById('btn-src-pattern').classList.toggle('active', src === 'pattern');
      document.getElementById('btn-src-image').classList.toggle('active', src === 'image');
      document.getElementById('btn-src-camera').classList.toggle('active', src === 'camera');
      document.getElementById('voronoi-sections').style.display = src === 'pattern' ? '' : 'none';
      document.getElementById('voronoi-sections-2').style.display = src === 'pattern' ? '' : 'none';
      document.getElementById('camera-controls').style.display = src === 'camera' ? '' : 'none';
      document.getElementById('image-controls').style.display = src === 'image' ? '' : 'none';

      if (src === 'camera') {
        startCamera();
      } else {
        stopCamera();
      }
      window.shaderDirty = true;
    }

    function startCamera() {
      const facing = window.shaderParams.cameraFacing || 'user';
      const constraints = {
        video: { facingMode: facing, width: { ideal: 1280 }, height: { ideal: 720 } },
        audio: false
      };
      navigator.mediaDevices.getUserMedia(constraints).then(stream => {
        cameraStream = stream;
        const video = document.getElementById('cameraVideo');
        video.srcObject = stream;
        video.play();
        window.cameraVideo = video;
        // Wait for video to actually have frames before rendering
        video.addEventListener('loadeddata', () => {
          window.shaderDirty = true;
        }, { once: true });
        window.shaderDirty = true;
      }).catch(err => {
        console.error('Camera error:', err);
        alert('Could not access camera. Check permissions.');
        setSource('pattern');
      });
    }

    function stopCamera() {
      if (cameraStream) {
        cameraStream.getTracks().forEach(t => t.stop());
        cameraStream = null;
      }
      window.cameraVideo = null;
    }

    function flipCamera() {
      const p = window.shaderParams;
      p.cameraFacing = p.cameraFacing === 'user' ? 'environment' : 'user';
      if (p.source === 'camera') {
        stopCamera();
        startCamera();
      }
    }

    /* ── Custom color picker ──────────────────────────────────────── */
    let cpCallback = null;
    let cpH = 0, cpS = 1, cpV = 1;

    function hsv2rgbPicker(h, s, v) {
      h = ((h % 1) + 1) % 1;
      const i = Math.floor(h * 6), f = h * 6 - i;
      const p = v * (1 - s), q = v * (1 - s * f), t = v * (1 - s * (1 - f));
      let r, g, b;
      switch (i % 6) {
        case 0: r=v;g=t;b=p;break; case 1: r=q;g=v;b=p;break;
        case 2: r=p;g=v;b=t;break; case 3: r=p;g=q;b=v;break;
        case 4: r=t;g=p;b=v;break; default: r=v;g=p;b=q;
      }
      return [Math.round(r*255), Math.round(g*255), Math.round(b*255)];
    }

    function rgb2hsvPicker(r, g, b) {
      r/=255; g/=255; b/=255;
      const mx=Math.max(r,g,b), mn=Math.min(r,g,b), d=mx-mn;
      let h=0, s=mx?d/mx:0, v=mx;
      if(d){if(mx===r)h=((g-b)/d+6)%6;else if(mx===g)h=(b-r)/d+2;else h=(r-g)/d+4;h/=6;}
      return [h, s, v];
    }

    function openColorPicker(hexColor, callback) {
      cpCallback = callback;
      const r = parseInt(hexColor.slice(1,3),16)||0;
      const g = parseInt(hexColor.slice(3,5),16)||0;
      const b = parseInt(hexColor.slice(5,7),16)||0;
      [cpH, cpS, cpV] = rgb2hsvPicker(r, g, b);
      document.getElementById('color-picker-overlay').classList.add('open');
      updatePickerUI();
    }

    function closeColorPicker() {
      document.getElementById('color-picker-overlay').classList.remove('open');
      cpCallback = null;
    }

    function confirmColorPicker() {
      if (cpCallback) {
        const [r,g,b] = hsv2rgbPicker(cpH, cpS, cpV);
        const hex = '#' + [r,g,b].map(v => v.toString(16).padStart(2,'0')).join('');
        cpCallback(hex, r, g, b);
      }
      closeColorPicker();
    }

    function updatePickerUI() {
      const svArea = document.getElementById('cp-sv-area');
      const [r,g,b] = hsv2rgbPicker(cpH, 1, 1);
      svArea.style.background = `linear-gradient(to top, #000, transparent), linear-gradient(to right, #fff, rgb(${r},${g},${b}))`;
      const cursor = document.getElementById('cp-sv-cursor');
      cursor.style.left = (cpS * 100) + '%';
      cursor.style.top = ((1 - cpV) * 100) + '%';
      const hueCursor = document.getElementById('cp-hue-cursor');
      hueCursor.style.left = (cpH * 100) + '%';
      const hueCol = hsv2rgbPicker(cpH, 1, 1);
      hueCursor.style.background = `rgb(${hueCol[0]},${hueCol[1]},${hueCol[2]})`;
      const [cr,cg,cb] = hsv2rgbPicker(cpH, cpS, cpV);
      document.getElementById('cp-preview').style.background = `rgb(${cr},${cg},${cb})`;
      document.getElementById('cp-r').value = cr;
      document.getElementById('cp-g').value = cg;
      document.getElementById('cp-b').value = cb;
    }

    // SV area interaction
    (function() {
      const sv = document.getElementById('cp-sv-area');
      function updateSV(x, y) {
        const rect = sv.getBoundingClientRect();
        cpS = Math.max(0, Math.min(1, (x - rect.left) / rect.width));
        cpV = Math.max(0, Math.min(1, 1 - (y - rect.top) / rect.height));
        updatePickerUI();
      }
      sv.addEventListener('mousedown', e => { updateSV(e.clientX, e.clientY);
        const onMove = ev => updateSV(ev.clientX, ev.clientY);
        const onUp = () => { window.removeEventListener('mousemove', onMove); window.removeEventListener('mouseup', onUp); };
        window.addEventListener('mousemove', onMove); window.addEventListener('mouseup', onUp);
      });
      sv.addEventListener('touchstart', e => { e.preventDefault(); updateSV(e.touches[0].clientX, e.touches[0].clientY); }, {passive:false});
      sv.addEventListener('touchmove', e => { e.preventDefault(); updateSV(e.touches[0].clientX, e.touches[0].clientY); }, {passive:false});
    })();

    // Hue bar interaction
    (function() {
      const bar = document.getElementById('cp-hue-bar');
      function updateH(x) {
        const rect = bar.getBoundingClientRect();
        cpH = Math.max(0, Math.min(1, (x - rect.left) / rect.width));
        updatePickerUI();
      }
      bar.addEventListener('mousedown', e => { updateH(e.clientX);

        const onUp = () => { window.removeEventListener('mousemove', onMove); window.removeEventListener('mouseup', onUp); };
        window.addEventListener('mousemove', onMove); window.addEventListener('mouseup', onUp);

      bar.addEventListener('touchstart', e => { e.preventDefault(); updateH(e.touches[0].clientX); }, {passive:false});

    // RGB input fields

    // Helper: open custom picker for any color swatch
    function hookColorSwatch(swatchId, inputId, paramKey) {
      const swatch = document.getElementById(swatchId);
      if (!swatch) return;
      swatch.style.cursor = 'pointer';
      swatch.addEventListener('click', function(e) {
        e.preventDefault(); e.stopPropagation();

    function addPPEffect(typeInt) {
      var p = window.shaderParams;
      if (!p.ppStack) p.ppStack = [];
      if (p.ppStack.length >= 16) return;
      var cat = PP_CATALOG.find(function(c){ return c.type === typeInt; });
      if (!cat) return;
      var item = { type: typeInt, enabled: true, collapsed: false, id: ++ppIdCounter };
      cat.params.forEach(function(pr) { item[pr.key] = pr.def; });
      // Fill types get blend mode
      if (cat.hasBland) { item.blendMode = cat.defBlend || 8; item.hueOff = 0; }
      // Color fill gets color
      if (cat.hasColor) { item.fillColor = '#ffffff'; }
      // Gradient fill gets gradient stops + direction
      if (cat.hasGradient) {
        item.gradStops = [{pos:0,r:0,g:0,b:0,hex:'#000000'},{pos:1,r:255,g:255,b:255,hex:'#ffffff'}];
        item.gradDir = 0; item.radialCenterX = 0; item.radialCenterY = 0; item.radialScale = 1;
      }
      // Opacity Pattern gets patterns
      if (cat.hasOpPattern) {
        item.patterns = [
          {id:1, active:true, grid:[[0,1],[1,0]], hueShift:0.04, hueOpacity:0.92}
        ];
        item.patternIdCounter = 1; item.patternSeed = 0; item.patternMode = 0;
        // Copy from instance if it has existing patterns
        if (inst.opPatterns && inst.opPatterns.length > 0) {
          item.patterns = JSON.parse(JSON.stringify(inst.opPatterns));
          item.patternIdCounter = inst.opPatternIdCounter || item.patterns.length;
          item.patternSeed = inst.opPatternSeed || 0;
          item.patternMode = inst.opPatternMode || 0;
        }
      }
      p.ppStack.push(item);
      renderPPStack();
      document.getElementById('pp-menu').style.display = 'none';
      window.shaderDirty = true;
    }



    function removePPItem(id) {
      var p = window.shaderParams;

    }

    function togglePPItem(id) {

      var item = (p.ppStack || []).find(function(e){ return e.id === id; });
      if (!item) return;
      item.enabled = !item.enabled;
      var btn = document.getElementById('pp-toggle-'+id);
      if (btn) btn.classList.toggle('on', item.enabled);

    function renderPPStack() {
      var p = window.shaderParams;
      var list = document.getElementById('pp-stack-list');
      if (!list) return;
      var stack = p.ppStack || [];
      stack.forEach(function(e){ if (e.id >= ppIdCounter) ppIdCounter = e.id + 1; });
      var N = stack.length;

      list.innerHTML = stack.map(function(item, idx) {
        var cat = PP_CATALOG.find(function(c){ return c.type === item.type; });
        if (!cat) return '';
        var isCollapsed = item.collapsed === true;
        var slidersHTML = cat.params.map(function(pr) {
          var val = item[pr.key] != null ? item[pr.key] : pr.def;
          var fmtVal = Number.isInteger(pr.step) ? Math.round(val) : val.toFixed(2);
          return '<div class="row"><label style="font-size:10px">'+pr.label+'</label>' +
            '<input type="range" data-ppid="'+item.id+'" data-ppkey="'+pr.key+'" min="'+pr.min+'" max="'+pr.max+'" step="'+pr.step+'" value="'+val+'">' +
            '<input type="number" class="val" data-ppid="'+item.id+'" data-ppkey="'+pr.key+'" value="'+fmtVal+'" min="'+pr.min+'" max="'+pr.max+'" step="'+pr.step+'">' +
            '</div>';
        }).join('');

        // Blend mode dropdown for fill types
        var blendHTML = '';
        if (cat.hasBland) {
          var bm = item.blendMode != null ? item.blendMode : 8;
          var blendOpts = [['Normal',8],['Overlay',0],['Multiply',1],['Screen',2],['Soft Light',3],['Hard Light',4],['Color Dodge',5],['Color Burn',6],['Linear Light',7],['Hue Shift',9]];
          blendHTML = '<div class="row"><label style="font-size:10px">Blend</label><select data-ppid="'+item.id+'" data-ppkey="_blendMode" style="flex:1;font-size:10px">' +
            blendOpts.map(function(o){ return '<option value="'+o[1]+'"'+(bm===o[1]?' selected':'')+'>'+o[0]+'</option>'; }).join('') +
            '</select></div>';
          if (bm === 9) {
            var ho = item.hueOff || 0;
            blendHTML += '<div class="row"><label style="font-size:10px">Hue Offset</label><input type="range" data-ppid="'+item.id+'" data-ppkey="hueOff" min="0" max="1" step="0.01" value="'+ho+'"><input type="number" class="val" data-ppid="'+item.id+'" data-ppkey="hueOff" value="'+ho.toFixed(2)+'" min="0" max="1" step="0.01"></div>';
          }
        }

        // Color swatch for color fill
        var colorHTML = '';
        if (cat.hasColor) {
          colorHTML = '<div class="row"><label style="font-size:10px">Color</label><div class="color-swatch" id="pp-color-'+item.id+'" style="background:'+(item.fillColor||'#ffffff')+';cursor:pointer;width:36px;height:20px;border-radius:3px;border:1px solid rgba(255,255,255,0.2)" onclick="ppPickColor('+item.id+')"></div></div>';
        }

        // Collapse chevron
        var chevron = '<svg class="collapse-chev" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" style="transform:rotate('+(isCollapsed?'-90':'0')+'deg)" onclick="togglePPCollapse('+item.id+')"><polyline points="6,9 12,15 18,9"/></svg>';

        // Reorder arrows
        var upBtn = idx > 0 ? '<button class="btn-circ" onclick="movePPItem('+item.id+',-1)" title="Move up">▲</button>' : '';
        var dnBtn = idx < N-1 ? '<button class="btn-circ" onclick="movePPItem('+item.id+',1)" title="Move down">▼</button>' : '';
        var dupBtn = '<button class="btn-circ" onclick="dupPPItem('+item.id+')" title="Duplicate">⧉</button>';

        var opPatHTML = '';
        var gradEditorHTML = '';

        return '<div class="group-card" style="margin-bottom:6px" data-ppcard="'+item.id+'">' +
          '<div class="group-header" style="display:flex;align-items:center;gap:3px">' +
          chevron +
          '<span class="g-title" style="flex:1;font-size:11px">'+cat.name+'</span>' +
          upBtn + dnBtn + dupBtn +
          '<button class="btn-circ danger" onclick="removePPItem('+item.id+')" title="Remove">✕</button>' +
          '<button class="toggle-active'+(item.enabled!==false?' on':'')+'" id="pp-toggle-'+item.id+'" onclick="togglePPItem('+item.id+')" style="width:32px;min-width:32px;height:16px"></button>' +
          '</div>' +
          '<div class="group-body'+(item.enabled===false?' controls-disabled':'')+'" id="pp-body-'+item.id+'" style="display:'+(isCollapsed?'none':'')+'">' +
          blendHTML + colorHTML + opPatHTML + gradEditorHTML + slidersHTML + '</div></div>';
      }).join('');

      wirePPStack();
    }

    function togglePPCollapse(id) {
      var p = window.shaderParams;
      var item = (p.ppStack || []).find(function(e){ return e.id === id; });
      if (!item) return;
      item.collapsed = !item.collapsed;
      var body = document.getElementById('pp-body-'+id);
      if (body) body.style.display = item.collapsed ? 'none' : '';
      // Update chevron
      var card = document.querySelector('[data-ppcard="'+id+'"]');
      if (card) {
        var svg = card.querySelector('svg');
        if (svg) svg.style.transform = 'rotate('+(item.collapsed?'-90':'0')+'deg)';
      }

    function movePPItem(id, dir) {
      var p = window.shaderParams;
      var stack = p.ppStack || [];
      var idx = stack.findIndex(function(e){ return e.id === id; });
      if (idx < 0) return;
      var newIdx = idx + dir;
      if (newIdx < 0 || newIdx >= stack.length) return;
      var tmp = stack[idx];
      stack[idx] = stack[newIdx];
      stack[newIdx] = tmp;
      renderPPStack();
      window.shaderDirty = true;
    }

    function dupPPItem(id) {
      var p = window.shaderParams;
      var stack = p.ppStack || [];
      if (stack.length >= 16) return;
      var item = stack.find(function(e){ return e.id === id; });
      if (!item) return;
      var dup = JSON.parse(JSON.stringify(item));
      dup.id = ++ppIdCounter;
      var idx = stack.indexOf(item);
      stack.splice(idx + 1, 0, dup);
      renderPPStack();
      window.shaderDirty = true;
    }

    function ppPickColor(id) {
      var p = window.shaderParams;
      var item = (p.ppStack || []).find(function(e){ return e.id === id; });
      if (!item) return;
      openColorPicker(item.fillColor || '#ffffff', function(hex, r, g, b) {
        item.fillColor = hex;
        item.fillR = r / 255; item.fillG = g / 255; item.fillB = b / 255;
        var sw = document.getElementById('pp-color-'+id);
        if (sw) sw.style.background = hex;
        window.shaderDirty = true;
      });
    }

    function wirePPStack() {
      var p = window.shaderParams;
      var stack = p.ppStack || [];
      // Wire all sliders and number inputs
      document.querySelectorAll('#pp-stack-list input[data-ppid]').forEach(function(el) {
        var id = parseInt(el.dataset.ppid);
        var key = el.dataset.ppkey;
        var item = stack.find(function(e){ return e.id === id; });
        if (!item) return;
        var isRange = el.type === 'range';
        var pair = isRange
          ? el.parentElement.querySelector('input[type="number"][data-ppkey="'+key+'"][data-ppid="'+id+'"]')
          : el.parentElement.querySelector('input[type="range"][data-ppkey="'+key+'"][data-ppid="'+id+'"]');

        el.addEventListener(isRange ? 'input' : 'change', function() {
          var v = parseFloat(el.value);
          if (isNaN(v)) return;

    /* ── Render the active instance into the panel ─── */
    function renderPixelateInstancePanel(idx) {
      var panel = document.getElementById('pix-instance-panel');
      if (!panel) return;
      panel.innerHTML = buildInstanceHTML(idx);
      wirePixelateInstance(idx);
      // Initialize shape gradient — wait two animation frames so the canvas has
      // been laid out and clientWidth is non-zero before we paint the bar.
      requestAnimationFrame(function() {
        requestAnimationFrame(function() { initPixShapeGrad(idx); });
      });
      // Render op patterns
      renderPixOpPatterns(idx);
      renderInstFilterStack(idx);
      // Wire gap swatch
      var swatch = document.getElementById('gapSwatch_' + idx);
      if (swatch) {
        swatch.onclick = function() {
          var inst = window.shaderParams.pixelateInstances[idx];
          openColorPicker(inst.gapColor || '#000000', function(hex) {
            inst.gapColor = hex;
            swatch.style.background = hex;
            window.shaderDirty = true;
          });
        };
      }
      // Wire fill color swatch
      var fillSwatch = document.getElementById('fillColorSwatch_' + idx);
      if (fillSwatch) {
        fillSwatch.onclick = function() {
          var inst = window.shaderParams.pixelateInstances[idx];
          openColorPicker(inst.fillColor || '#ffffff', function(hex) {
            inst.fillColor = hex;
            fillSwatch.style.background = hex;
            window.shaderDirty = true;
          });
        };
      }
    }

    /* ── Wire all inputs for an instance ──────────────── */
    function wirePixelateInstance(i) {
      function s(k) { return k + '_' + i; }
      var inst = window.shaderParams.pixelateInstances[i];

      function wireInstToShape(key, v) {
        if (inst.shapes && inst.shapes[inst.activeShapeIdx || 0]) {
          inst.shapes[inst.activeShapeIdx || 0][key] = v;
        }
      }
      function wireInst(slId, valId, key, fmt) {
        var sl = document.getElementById(slId);
        var va = document.getElementById(valId);
        if (!sl || !va) return;
        sl.addEventListener('input', function() {
          var v = parseFloat(sl.value);
          inst[key] = v;
          wireInstToShape(key, v);
          va.value = fmt(v);
          window.shaderDirty = true;
        });
        va.addEventListener('change', function() {
          var v = parseFloat(va.value);
          if (isNaN(v)) return;
          v = Math.max(parseFloat(sl.min), Math.min(parseFloat(sl.max), v));
          sl.value = v;
          inst[key] = v;
          wireInstToShape(key, v);
          va.value = fmt(v);
          window.shaderDirty = true;
        });
      }
      wireInst(s('sPixelW'),  s('vPixelW'),  'pixelW',  function(v){return Math.round(v);});
      wireInst(s('sPixelH'),  s('vPixelH'),  'pixelH',  function(v){return Math.round(v);});
      wireInst(s('sPixelScale'), s('vPixelScale'), 'pixelScale', function(v){return v.toFixed(2);});
      wireInst(s('sQuadSteps'), s('vQuadSteps'), 'quadSteps', function(v){return Math.round(v);});
      wireInst(s('sShapeMargin'), s('vShapeMargin'), 'shapeMargin', function(v){return Math.round(v);});
      wireInst(s('sShapeBleed'), s('vShapeBleed'), 'shapeBleed', function(v){return Math.round(v);});
      wireInst(s('sShapeSmoothness'), s('vShapeSmoothness'), 'shapeSmoothness', function(v){return v.toFixed(2);});
      wireInst(s('sInstBlendHueOff'), s('vInstBlendHueOff'), 'instanceBlendHueOff', function(v){return v.toFixed(2);});
      wireInst(s('sInstOpacity'), s('vInstOpacity'), 'instanceOpacity', function(v){return v.toFixed(2);});
      wireInst(s('sShapeScale'), s('vShapeScale'), 'shapeScale', function(v){return v.toFixed(2);});
      wireInst(s('sImgShapeScale'), s('vImgShapeScale'), 'shapeScale', function(v){return v.toFixed(2);});
      wireInst(s('sSdfMinScale'), s('vSdfMinScale'), 'sdfMinScale', function(v){return v.toFixed(2);});
      wireInst(s('sSdfMaxScale'), s('vSdfMaxScale'), 'sdfMaxScale', function(v){return v.toFixed(2);});
      wireInst(s('sSdfMinRotate'), s('vSdfMinRotate'), 'sdfMinRotate', function(v){return Math.round(v);});
      wireInst(s('sSdfMaxRotate'), s('vSdfMaxRotate'), 'sdfMaxRotate', function(v){return Math.round(v);});
      wireInst(s('sSdfMinOffset'), s('vSdfMinOffset'), 'sdfMinOffset', function(v){return v.toFixed(2);});
      wireInst(s('sSdfMaxOffset'), s('vSdfMaxOffset'), 'sdfMaxOffset', function(v){return v.toFixed(2);});
      wireInst(s('sGapOpacity'), s('vGapOpacity'), 'gapOpacity', function(v){return v.toFixed(2);});
      wireInst(s('sShapeGradOpacity'), s('vShapeGradOpacity'), 'shapeGradOpacity', function(v){return v.toFixed(2);});
      wireInst(s('sRadialX'), s('vRadialX'), 'radialCenterX', function(v){return v.toFixed(2);});
      wireInst(s('sRadialY'), s('vRadialY'), 'radialCenterY', function(v){return v.toFixed(2);});
      wireInst(s('sRadialScale'), s('vRadialScale'), 'radialScale', function(v){return v.toFixed(2);});
      wireInst(s('sOpPatSeed'), s('vOpPatSeed'), 'opPatternSeed', function(v){return Math.round(v);});
      wireInst(s('sImgPixelCols'), s('vImgPixelCols'), 'imgPixelCols', function(v){return Math.round(v);});
      wireInst(s('sImgPixelRows'), s('vImgPixelRows'), 'imgPixelRows', function(v){return Math.round(v);});
      wireInst(s('sImgPixelOpacity'), s('vImgPixelOpacity'), 'imgPixelOpacity', function(v){return v.toFixed(2);});
      wireInst(s('sImgPixelMinScale'), s('vImgPixelMinScale'), 'imgPixelMinScale', function(v){return v.toFixed(2);});
      wireInst(s('sImgPixelMaxScale'), s('vImgPixelMaxScale'), 'imgPixelMaxScale', function(v){return v.toFixed(2);});
      wireInst(s('sImgPixelMinRotate'), s('vImgPixelMinRotate'), 'imgPixelMinRotate', function(v){return Math.round(v);});
      wireInst(s('sImgPixelMaxRotate'), s('vImgPixelMaxRotate'), 'imgPixelMaxRotate', function(v){return Math.round(v);});
      wireInst(s('sImgPixelMinOffset'), s('vImgPixelMinOffset'), 'imgPixelMinOffset', function(v){return v.toFixed(2);});
      wireInst(s('sImgPixelMaxOffset'), s('vImgPixelMaxOffset'), 'imgPixelMaxOffset', function(v){return v.toFixed(2);});

      // Layer 2 image pixel sliders
      wireInst(s('sImgPixel2Cols'), s('vImgPixel2Cols'), 'imgPixel2Cols', function(v){return Math.round(v);});

    function initFilterGradEditor(instIdx, item) {
      var barId = 'ifgrad-bar-'+instIdx+'-'+item.id;
      var trackId = 'ifgrad-track-'+instIdx+'-'+item.id;
      var bar = document.getElementById(barId);
      var track = document.getElementById(trackId);
      if (!bar || !track) return;
      if (!item.gradStops || item.gradStops.length < 2) {
        item.gradStops = [{pos:0,r:0,g:0,b:0,hex:'#000000'},{pos:1,r:255,g:255,b:255,hex:'#ffffff'}];
      }
      function sortedStops() { return item.gradStops.slice().sort(function(a,b){ return a.pos-b.pos; }); }
      function renderBar() {
        var w = bar.clientWidth || 200; if (w < 2) { requestAnimationFrame(renderBar); return; }
        bar.width = w; var ctx = bar.getContext('2d'); var h2 = bar.height;
        var stops = sortedStops(); var grad = ctx.createLinearGradient(0,0,w,0);
        stops.forEach(function(s){ grad.addColorStop(s.pos, s.hex); });
        ctx.fillStyle = grad; ctx.fillRect(0,0,w,h2);
      }
      function renderHandles() {
        track.innerHTML = '';
        item.gradStops.forEach(function(stop, idx) {
          var handle = document.createElement('div'); handle.className = 'grad-handle';
          handle.style.left = (stop.pos*100)+'%'; handle.style.background = stop.hex;
          handle.style.touchAction = 'none';
          var dragging = false, hasMoved = false, tapTimer = null, tapCount = 0;
          function startDrag(){ dragging=true; hasMoved=false; handle.classList.add('dragging'); }
          function moveDrag(cx) {
            if(!dragging) return; hasMoved=true;
            var tr = track.getBoundingClientRect();
            stop.pos = Math.max(0,Math.min(1,(cx-tr.left)/tr.width));
            handle.style.left = (stop.pos*100)+'%'; renderBar(); window.shaderDirty=true;
          }
          function endDrag() {
            var wasDrag = hasMoved; dragging=false; hasMoved=false; handle.classList.remove('dragging');
            if(!wasDrag){
              tapCount++;
              if(tapCount===1){ tapTimer=setTimeout(function(){
                tapCount=0;
                openColorPicker(stop.hex,function(hex,r,g,b){
                  stop.r=r;stop.g=g;stop.b=b;stop.hex=hex;
                  handle.style.background=hex; renderBar(); window.shaderDirty=true;
                });
              },250); }
              else if(tapCount>=2){ clearTimeout(tapTimer);tapCount=0;
                if(item.gradStops.length>2){ item.gradStops.splice(item.gradStops.indexOf(stop),1); renderHandles();renderBar();window.shaderDirty=true; }
              }
            } else { tapCount=0; }
          }
          handle.addEventListener('mousedown',function(e){
            e.preventDefault();e.stopPropagation();startDrag();
            var onM=function(ev){moveDrag(ev.clientX)};
            var onU=function(){endDrag();window.removeEventListener('mousemove',onM);window.removeEventListener('mouseup',onU)};
            window.addEventListener('mousemove',onM);window.addEventListener('mouseup',onU);
          });
          handle.addEventListener('touchstart',function(e){if(e.touches.length!==1)return;e.preventDefault();e.stopPropagation();startDrag();},{passive:false});
          handle.addEventListener('touchmove',function(e){e.preventDefault();if(e.touches.length===1)moveDrag(e.touches[0].clientX);},{passive:false});
          handle.addEventListener('touchend',function(e){e.preventDefault();endDrag();},{passive:false});
          track.appendChild(handle);
        });
      }
      bar.onclick = function(e) {
        var rect = e.target.getBoundingClientRect();
        var pos = (e.clientX - rect.left) / rect.width;
        var stops = sortedStops();
        var lo=stops[0],hi=stops[stops.length-1];
        for(var j=0;j<stops.length-1;j++){if(pos>=stops[j].pos&&pos<=stops[j+1].pos){lo=stops[j];hi=stops[j+1];break;}}
        var range=hi.pos-lo.pos, f=range<0.0001?0:(pos-lo.pos)/range;
        var r=Math.round(lo.r+(hi.r-lo.r)*f),g=Math.round(lo.g+(hi.g-lo.g)*f),b=Math.round(lo.b+(hi.b-lo.b)*f);
        item.gradStops.push({pos:pos,r:r,g:g,b:b,hex:'#'+[r,g,b].map(function(c){return c.toString(16).padStart(2,'0');}).join('')});
        renderHandles();renderBar();window.shaderDirty=true;
      };
      renderBar(); renderHandles();
    }

    function wireInstFilterStack(i) {
      var inst = window.shaderParams.pixelateInstances[i];
      if (!inst) return;
      var stack = inst.filters || [];
      var list = document.getElementById('filter-stack-list_'+i);
      if (!list) return;
      list.querySelectorAll('input[data-ifid]').forEach(function(el) {
        var id = parseInt(el.dataset.ifid);
        var key = el.dataset.ifkey;
        var item = stack.find(function(e){ return e.id === id; });
        if (!item) return;
        var isRange = el.type === 'range';
        var pair = isRange
          ? el.parentElement.querySelector('input[type="number"][data-ifkey="'+key+'"][data-ifid="'+id+'"]')
          : el.parentElement.querySelector('input[type="range"][data-ifkey="'+key+'"][data-ifid="'+id+'"]');
        el.addEventListener(isRange ? 'input' : 'change', function() {
          var v = parseFloat(el.value);
          if (isNaN(v)) return;
          if (!isRange) v = Math.max(parseFloat(el.min), Math.min(parseFloat(el.max), v));
          item[key] = v;
          if (pair) pair.value = Number.isInteger(parseFloat(el.step)) ? Math.round(v) : v.toFixed(2);
          pixInstDirty(i);
        });
      });
      // Wire opacity pattern controls
      list.querySelectorAll('[data-ifpat-toggle]').forEach(function(btn) {
        btn.addEventListener('click', function() {
          var parts = btn.dataset.ifpatToggle.split('-');
          var filterId = parseInt(parts[0]), patId = parseInt(parts[1]);
          var item = stack.find(function(e){ return e.id === filterId; });
          if (!item || !item.patterns) return;
          var pat = item.patterns.find(function(p){ return p.id === patId; });
          if (!pat) return;
          pat.active = !pat.active;
          btn.classList.toggle('on', pat.active);
          btn.closest('.group-card').querySelector('.group-body').classList.toggle('controls-disabled', !pat.active);
          pixInstDirty(i);
        });
      });
      list.querySelectorAll('[data-ifpat-del]').forEach(function(btn) {
        btn.addEventListener('click', function() {
          var parts = btn.dataset.ifpatDel.split('-');
          var filterId = parseInt(parts[0]), patId = parseInt(parts[1]);
          var item = stack.find(function(e){ return e.id === filterId; });
          if (!item || !item.patterns) return;
          item.patterns = item.patterns.filter(function(p){ return p.id !== patId; });
          renderInstFilterStack(i);
          pixInstDirty(i);
        });
      });
      list.querySelectorAll('[data-ifpat-range]').forEach(function(el) {
        var parts = el.dataset.ifpatRange.split('-');
        var filterId = parseInt(parts[0]), patId = parseInt(parts[1]);
        var key = el.dataset.patkey;
        var item = stack.find(function(e){ return e.id === filterId; });
        if (!item || !item.patterns) return;
        var pat = item.patterns.find(function(p){ return p.id === patId; });
        if (!pat) return;
        el.addEventListener('input', function() {
          pat[key] = parseFloat(el.value);
          var numEl = el.parentElement.querySelector('input[type="number"]');
          if (numEl) numEl.value = pat[key].toFixed(2);
          pixInstDirty(i);
        });
      });
      list.querySelectorAll('[data-ifpat-grid]').forEach(function(el) {
        var parts = el.dataset.ifpatGrid.split('-');
        var filterId = parseInt(parts[0]), patId = parseInt(parts[1]);
        var item = stack.find(function(e){ return e.id === filterId; });
        if (!item || !item.patterns) return;
        var pat = item.patterns.find(function(p){ return p.id === patId; });
        if (!pat) return;
        el.addEventListener('change', function() {
          pat.grid = el.value.trim().split('\n').map(function(r){ return r.split(',').map(Number); });
          pixInstDirty(i);
        });
      });
      list.querySelectorAll('select[data-ifid]').forEach(function(sel) {
        var id = parseInt(sel.dataset.ifid);
        var item = stack.find(function(e){ return e.id === id; });
        if (!item) return;
        sel.addEventListener('change', function() {
          if (sel.dataset.ifkey === '_blendMode') {
            item.blendMode = parseInt(sel.value);
            renderInstFilterStack(i);
          }
          pixInstDirty(i);
        });
      });
    }

    /* ── Per-instance toggle/set functions ──────────── */
    function syncActiveShapeBack(i) {
      var inst = window.shaderParams.pixelateInstances[i];
      if (!inst || !inst.shapes) return;
      var sh = inst.shapes[inst.activeShapeIdx || 0];
      if (!sh) return;
      // Sync instance-level shape props back to active shape
      var keys = ['pixelShape','shapeMargin','shapeBleed','shapeSmoothness','shapeScale','forceSquare',
        'sdfAffectScale','sdfMinScale','sdfMaxScale','sdfAffectRotate','sdfMinRotate','sdfMaxRotate',
        'sdfAffectOffset','sdfMinOffset','sdfMaxOffset',
        'imgPixelEnabled','imgPixelCols','imgPixelRows','imgPixelOpacity','imgPixelBlend','imgPixelHueOff','imgPixelMask',
        'imgPixelAffectScale','imgPixelMinScale','imgPixelMaxScale',
        'imgPixelAffectRotate','imgPixelMinRotate','imgPixelMaxRotate',
        'imgPixelAffectOffset','imgPixelMinOffset','imgPixelMaxOffset',
        'twoImage','imgPixel2Enabled','imgPixel2Cols','imgPixel2Rows','imgPixel2Opacity','imgPixel2Blend',
        'imgPixel2HueOff','imgPixel2Mask','imgPixel2AffectScale','imgPixel2AffectRotate','imgPixel2AffectOffset',
        'imgPixel2MinScale','imgPixel2MaxScale','imgPixel2MinRotate','imgPixel2MaxRotate',
        'imgPixel2MinOffset','imgPixel2MaxOffset',
        'filters','filtersEnabled'];
      keys.forEach(function(k) { if (inst[k] !== undefined) sh[k] = inst[k]; });
    }

    function pixInstDirty(i) {
      syncActiveShapeBack(i);
      var inst = window.shaderParams.pixelateInstances[i];
      if (inst && inst.enabled === false) return;
      window.shaderDirty = true;
    }

    /* ── Per-instance shape gradient ──────────────────── */
    function initPixShapeGrad(i) {
      var inst = window.shaderParams.pixelateInstances[i];
      var barId = 'shapeGradBar_'+i;
      var trackId = 'shapeGradTrack_'+i;
      var bar = document.getElementById(barId);
      var track = document.getElementById(trackId);
      if (!bar || !track) return;

      function sortedStops() {
        return (inst.shapeGradStops||[]).slice().sort(function(a,b){ return a.pos-b.pos; });
      }
      function renderBar() {
        var w = bar.clientWidth || bar.parentElement && bar.parentElement.clientWidth || 200;
        if (w < 2) {
          // Layout not ready — retry after a frame
          requestAnimationFrame(renderBar);
          return;
        }
        bar.width = w;
        var ctx = bar.getContext('2d');
        var h = bar.height;
        var stops = sortedStops();
        var grad = ctx.createLinearGradient(0,0,w,0);
        stops.forEach(function(s){ grad.addColorStop(s.pos, s.hex); });
        ctx.fillStyle = grad;
        ctx.fillRect(0,0,w,h);
      }
      function syncToGL() {
        if (window.uploadShapeGradient) window.uploadShapeGradient(sortedStops());
      }
      function renderHandles() {
        track.innerHTML = '';
        var stops = inst.shapeGradStops || [];
        stops.forEach(function(stop, idx) {
          var handle = document.createElement('div');
          handle.className = 'grad-handle';
          handle.style.left = (stop.pos * 100) + '%';
          handle.style.background = stop.hex;
          handle.style.touchAction = 'none';
          var dragging = false, hasMoved = false, tapTimer = null, tapCount = 0;
          function startDrag(cx){ dragging=true; hasMoved=false; handle.classList.add('dragging'); }
          function moveDrag(cx) {
            if(!dragging) return; hasMoved=true;
            var tr = track.getBoundingClientRect();
            stop.pos = Math.max(0,Math.min(1,(cx-tr.left)/tr.width));
            handle.style.left = (stop.pos*100)+'%';
            renderBar(); syncToGL();
          }
          function endDrag() {
            var wasDrag = hasMoved; dragging=false; hasMoved=false; handle.classList.remove('dragging');
            if(!wasDrag){
              tapCount++;
              if(tapCount===1){
                tapTimer=setTimeout(function(){
                  tapCount=0;
                  openColorPicker(stop.hex,function(hex,r,g,b){
                    stop.r=r;stop.g=g;stop.b=b;stop.hex=hex;
                    handle.style.background=hex;
                    renderBar();syncToGL();
                  });
                },250);
              } else if(tapCount>=2){
                clearTimeout(tapTimer);tapCount=0;
                if(stops.length>2){ stops.splice(stops.indexOf(stop),1); renderHandles();renderBar();syncToGL(); }
              }
            } else { tapCount=0; }
          }
          handle.addEventListener('mousedown',function(e){
            e.preventDefault();e.stopPropagation();startDrag(e.clientX);
            var onM=function(ev){moveDrag(ev.clientX)};
            var onU=function(){endDrag();window.removeEventListener('mousemove',onM);window.removeEventListener('mouseup',onU)};
            window.addEventListener('mousemove',onM);window.addEventListener('mouseup',onU);
          });
          handle.addEventListener('touchstart',function(e){if(e.touches.length!==1)return;e.preventDefault();e.stopPropagation();startDrag(e.touches[0].clientX);},{passive:false});
          handle.addEventListener('touchmove',function(e){e.preventDefault();if(e.touches.length===1)moveDrag(e.touches[0].clientX);},{passive:false});
          handle.addEventListener('touchend',function(e){e.preventDefault();endDrag();},{passive:false});
          track.appendChild(handle);
        });
      }

      // Bar click: add stop
      bar.onclick = function(e) {
        var rect = e.target.getBoundingClientRect();
        var pos = (e.clientX - rect.left) / rect.width;
        var stops = sortedStops();
        var lo=stops[0],hi=stops[stops.length-1];
        for(var j=0;j<stops.length-1;j++){ if(pos>=stops[j].pos&&pos<=stops[j+1].pos){lo=stops[j];hi=stops[j+1];break;} }
        var range=hi.pos-lo.pos, f=range<0.0001?0:(pos-lo.pos)/range;
        var r=Math.round(lo.r+(hi.r-lo.r)*f),g=Math.round(lo.g+(hi.g-lo.g)*f),b=Math.round(lo.b+(hi.b-lo.b)*f);
        inst.shapeGradStops.push({pos:pos,r:r,g:g,b:b,hex:'#'+[r,g,b].map(function(c){return c.toString(16).padStart(2,'0');}).join('')});
        renderHandles();renderBar();syncToGL();
      };

      renderBar();
      renderHandles();
      // Don't call syncToGL() here — render loop uploads per-instance gradients

      // Re-render if the panel was hidden when first initialized (e.g. tab not active)
      if (typeof ResizeObserver !== 'undefined') {
        var _ro = new ResizeObserver(function(entries) {
          if (bar.clientWidth > 1) { renderBar(); _ro.disconnect(); }
        });
        _ro.observe(bar);
      }
    }

    function computeRandomBgColor() {
      var p = window.shaderParams;
      // Simple: generate a single 0-1 float from the seed, then run it through
      // the active color filter exactly as the shader would.
      var t = shaderHash((p.bgSeed || 0) * 1.618033988 + 0.5);

      var r, g, b;

      if (p.colorize !== false && (p.colorMode || 0) === 0) {
        // ── Gradient mode: sample the gradient at t ──
        var gc = sampleGradient(p.gradientStops, t);
        r = gc.r; g = gc.g; b = gc.b;
      } else {
        // ── Hue mode (or no colorize): t is the raw hue, apply hueOffset + hueRadius ──
        var hueRadius = p.hueRadius != null ? p.hueRadius : 1.0;
        var hueOffset = p.hueOffset || 0;
        var hue = ((t * hueRadius + hueOffset) % 1.0 + 1.0) % 1.0;
        // Sat from satMin/satMax midpoint
        var satMin = p.satMin != null ? p.satMin : 0;
        var satMax = p.satMax != null ? p.satMax : 1;
        var sat = (satMin + satMax) * 0.5;
        // Val from valueMin/valueMax midpoint
        var valMin = p.valueMin != null ? p.valueMin : 0.75;
        var valMax = p.valueMax != null ? p.valueMax : 1.0;
        var val = (valMin + valMax) * 0.5;
        var rgb = hsvToRgbJS(hue, sat, val);
        r = rgb[0]; g = rgb[1]; b = rgb[2];
      }

      return rgbFloatToHex(r, g, b);
    }

    // Safe file download — prevents page reload on mobile
    function downloadBlob(blob, filename) {
      // Try navigator.share for mobile (if supported and user wants it)
      // Otherwise use standard download
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0;pointer-events:none';
      a.href = url;
      a.download = filename;
      a.target = '_self';
      a.rel = 'noopener';
      document.body.appendChild(a);
      // Use setTimeout to break out of any event handler chain
      setTimeout(() => {
        a.click();
        setTimeout(() => {
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
        }, 500);
      }, 0);
    }

    /* ── Video Recording ──────────────────────────────────────────── */
    let videoRecorder = null, videoChunks = [], videoRecording = false, videoCancelFlag = false;

    function toggleVideoPanel() {
      const panel = document.getElementById('video-panel');

    // FPS dropdown handled inline via onchange

    function startRecording() {
      const format = document.getElementById('selVideoFmt').value;
      const canvas = document.getElementById('glCanvas');
      const p = window.shaderParams;
      const lengthMin = parseFloat(document.getElementById('selVideoLen').value);
      const fps = p.fps || 30;
      const totalFrames = Math.round(lengthMin * 60 * fps);
      const wasAnimating = p.animating;
      const savedRot = p.rot;
      const savedFlowTime = window._flowTime || 0;

      videoCancelFlag = false;
      videoRecording = true;
      p.animating = false;

      // Show progress UI
      document.getElementById('btn-record').style.display = 'none';
      document.getElementById('btn-cancel-record').style.display = '';
      document.getElementById('video-progress').style.display = '';
      document.getElementById('rec-indicator').classList.add('visible');
      const startTime = Date.now();

      function updateProgress(frame) {
        const pct = ((frame / totalFrames) * 100).toFixed(1);
        document.getElementById('video-bar').style.width = pct + '%';
        const elapsedSec = (Date.now() - startTime) / 1000;
        const estTotal = frame > 0 ? (elapsedSec / frame) * totalFrames : 0;
        document.getElementById('video-status').textContent =
          formatTime(elapsedSec) + ' / ~' + formatTime(estTotal) + '  (' + pct + '%)';
        document.getElementById('rec-text').textContent = 'REC ' + formatTime(elapsedSec);
      }

      function finish() {
        videoRecording = false;
        resetVideoUI();
        p.rot = savedRot;
        window._flowTimeOverride = savedFlowTime;
        if (!wasAnimating) p.animating = false;
        window.shaderDirty = true;
      }

      // Advance all animation state for a given frame index
      function advanceRecordFrame(frame, dt) {
        const isFlow = p.mode === 4;
        // Rotation (used by voronoi/noise modes and as secondary for flow)
        p.rot = (savedRot + p.animSpeed * frame * dt) % 360;
        const slider = document.getElementById('sRot');
        if (slider) slider.value = p.rot;
        const label = document.getElementById('vRot');
        if (label) { if (label.tagName === 'INPUT') label.value = Math.round(p.rot); else label.textContent = Math.round(p.rot) + '°'; }
        // Flow time (used by flow mode — drives iTime uniform via window._flowTimeOverride)
        if (isFlow) {
          const flowSpeed = p.flowSpeed != null ? p.flowSpeed : 1.0;
          window._flowTimeOverride = savedFlowTime + flowSpeed * frame * dt;
        }
        window.shaderDirty = true;
      }

      if (format === 'webm-hq') {
        // ── WebM HQ via MediaRecorder at 50 Mbps ──
        const stream = canvas.captureStream(0);
        const mimeTypes = ['video/webm;codecs=vp9', 'video/webm;codecs=vp8', 'video/webm'];
        let mime = '';
        for (const m of mimeTypes) { if (MediaRecorder.isTypeSupported(m)) { mime = m; break; } }
        if (!mime) { alert('WebM recording not supported. Try PNG Sequence or use Chrome.'); finish(); return; }

        videoChunks = [];
        videoRecorder = new MediaRecorder(stream, { mimeType: mime, videoBitsPerSecond: 50000000 });
        videoRecorder.ondataavailable = (e) => { if (e.data.size > 0) videoChunks.push(e.data); };
        videoRecorder.onstop = () => {
          if (!videoCancelFlag) {
            const blob = new Blob(videoChunks, { type: mime });
            downloadBlob(blob, 'voronoi-' + Date.now() + '.webm');
          }
          finish();
        };
        videoRecorder.start();

        let frame = 0;
        const dt = 1.0 / fps;
        function renderWebM() {
          if (videoCancelFlag || frame >= totalFrames) { videoRecorder.stop(); return; }
          advanceRecordFrame(frame, dt);
          // Double rAF: first rAF triggers the GL draw, second rAF ensures GPU finished
          requestAnimationFrame(() => {
            requestAnimationFrame(() => {
              const track = stream.getVideoTracks()[0];
              if (track.requestFrame) track.requestFrame();
              frame++;
              updateProgress(frame);
              setTimeout(renderWebM, 0);
            });
          });
        }
        renderWebM();

      } else if (format === 'png-zip') {
        // ── PNG Sequence → ZIP (lossless) ──
        if (typeof JSZip === 'undefined') {
          const script = document.createElement('script');
          script.src = 'https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js';
          script.onload = () => recordPngSequence(canvas, totalFrames, fps, p, savedFlowTime, startTime, advanceRecordFrame, updateProgress, finish);
          script.onerror = () => { alert('Failed to load JSZip library. Check network connection.'); finish(); };
          document.head.appendChild(script);
        } else {
          recordPngSequence(canvas, totalFrames, fps, p, savedFlowTime, startTime, advanceRecordFrame, updateProgress, finish);
        }
      }
    }

    function recordPngSequence(canvas, totalFrames, fps, p, savedFlowTime, startTime, advanceRecordFrame, updateProgress, finish) {
      const zip = new JSZip();
      const folder = zip.folder('frames');
      const padLen = totalFrames.toString().length;
      let frame = 0;
      const dt = 1.0 / fps;

      function renderPng() {
        if (videoCancelFlag || frame >= totalFrames) {
          if (videoCancelFlag) { finish(); return; }
          document.getElementById('video-status').textContent = 'Compressing ZIP...';
          zip.generateAsync({ type: 'blob', compression: 'STORED' }).then(blob => {
            downloadBlob(blob, 'voronoi-frames-' + Date.now() + '.zip');
            finish();
          });
          return;
        }

        advanceRecordFrame(frame, dt);

        // Double rAF to ensure GPU fully renders before PNG capture
        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            canvas.toBlob(blob => {
              const name = 'frame_' + String(frame).padStart(padLen, '0') + '.png';
              folder.file(name, blob);
              frame++;
              updateProgress(frame);
              setTimeout(renderPng, 0);
            }, 'image/png');
          });
        });
      }
      renderPng();
    }

    function applyLoadedConfig(loaded) {
      // Stop animation first
      window.shaderParams.animating = false;
      const btn = document.getElementById('btn-play');
      btn.classList.remove('active');
      const ppi = document.getElementById('panel-play-icon');
      const psi = document.getElementById('panel-stop-icon');

      const fpb = document.getElementById('btn-float-play');
      if (fpb) fpb.classList.remove('active');

      // Merge loaded config
      Object.assign(window.shaderParams, loaded);
      window.shaderParams.animating = false;

      // Update groupIdCounter
      const groups = window.shaderParams.groups || [];
      groupIdCounter = groups.reduce((mx, g) => Math.max(mx, g.id || 0), 0);

      applyConfigToUI();
      if (window.forceResize) window.forceResize();
      window.shaderDirty = true;

      // Restore image pixel textures from saved dataURLs.
      // uploadInstanceImgPixelTex is defined inside shader.js which may not have
      // finished compiling yet. We queue uploads and flush them as soon as the
      // function becomes available (shader.js calls window._flushTexQueue on ready).
      function tryUpload(fn, ...args) {
        if (typeof window[fn] === 'function') {
          window[fn](...args);
          window.shaderDirty = true;
        } else {
          window._texUploadQueue = window._texUploadQueue || [];
          window._texUploadQueue.push({ fn, args });
        }
      }

      var insts = window.shaderParams.pixelateInstances || [];
      insts.forEach(function(inst, idx) {
        if (inst.imgDataURL) {
          var img = new Image();
          img.onload = function() { tryUpload('uploadInstanceImgPixelTex', idx, img); };
          img.src = inst.imgDataURL;
        }
        if (inst.imgData2URL) {
          var img2 = new Image();
          img2.onload = function() { tryUpload('uploadInstanceImgPixel2Tex', idx, img2); };
          img2.src = inst.imgData2URL;
        }
      });

      // Restore image source texture
      if (window.shaderParams.imageDataURL) {
        var srcImg = new Image();
        srcImg.onload = function() { tryUpload('uploadImageSourceTex', srcImg); };
        srcImg.src = window.shaderParams.imageDataURL;
      }
    }

    function applyConfigToUI() {
      const p = window.shaderParams;

      function el(id) { return document.getElementById(id); }
      function setSlider(id, val, dispId, fmt) {
        const s = el(id), d = el(dispId);
        if (s && val != null) s.value = val;
        if (d && fmt && val != null) {
          if (d.tagName === 'INPUT') {
            d.value = String(fmt(val)).replace(/[°%]/g,'').trim();
          } else {
            d.textContent = fmt(val);
          }
        }
      }
      function setToggle(id, active) {
        const e = el(id); if (e) e.classList.toggle('active', !!active);
      }
      function setVis(id, show) {
        const e = el(id); if (e) e.style.display = show ? '' : 'none';
      }

      // Mode
      // Source
      var src = p.source || 'pattern';
      if (src === 'voronoi') src = 'pattern'; // backward compat
      p.source = src;
      setToggle('btn-src-pattern', src === 'pattern');
      setToggle('btn-src-image', src === 'image');
      setToggle('btn-src-camera', src === 'camera');
      setVis('voronoi-sections', src === 'pattern');
      setVis('voronoi-sections-2', src === 'pattern');
      setVis('camera-controls', src === 'camera');
      setVis('image-controls', src === 'image');

      setToggle('btn-chebyshev', p.mode === 0);
      setToggle('btn-manhattan', p.mode === 1);
      setToggle('btn-euclidean', p.mode === 2);
      setToggle('btn-noise', p.mode === 3);
      var btnFlow = el('btn-flow'); if(btnFlow) btnFlow.classList.toggle('active', p.mode === 4);
      setVis('noise-controls', p.mode === 3);
      setVis('flow-controls', p.mode === 4);
      setVis('voronoi-controls', p.mode !== 3 && p.mode !== 4);

      // Sliders
      setSlider('sPoints', p.points, 'vPoints', v => Math.round(v));
      setSlider('sSeed', p.seed, 'vSeed', v => Math.round(v));
      setSlider('sRot', p.rot, 'vRot', v => Math.round(v) + '°');
      setSlider('sDx', p.dx, 'vDx', v => v.toFixed(2));
      setSlider('sDy', p.dy, 'vDy', v => v.toFixed(2));
      setSlider('sSx', p.sx, 'vSx', v => v.toFixed(2));
      setSlider('sSy', p.sy, 'vSy', v => v.toFixed(2));
      setSlider('sSpring', p.spring, 'vSpring', v => v.toFixed(1));
      setSlider('sGridUnit', p.gridUnit, 'vGridUnit', v => Math.round(v));
      setSlider('sNoiseElemSize', p.noiseElementSize || 0.5, 'vNoiseElemSize', v => v.toFixed(2));
      setSlider('sNoiseOffsetX', p.noiseOffsetX || 0, 'vNoiseOffsetX', v => v.toFixed(3));

    function wire(sliderId, displayId, paramKey, fmt) {
      const slider  = document.getElementById(sliderId);
      const display = document.getElementById(displayId);

      // Params that affect the random bg color preview
      const bgRelevant = ['colorSeed','hueOffset','hueRadius','gradientSeed','satMin','satMax','valueMin','valueMax','brightSeed','satSeed'];
      function updateDisplay(v) {
        if (!display) return;
        if (isInput) {
          display.value = String(fmt(v)).replace(/[°%]/g,'').trim();
        } else {
          display.textContent = fmt(v);
        }
      }
      function afterChange() {
        if (bgRelevant.indexOf(paramKey) !== -1 && window.shaderParams.bgMode === 'random') {
